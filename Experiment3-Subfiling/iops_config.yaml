# =============================================================================
# IOPS Configuration - Gys_io (Gysela Benchmark)
# =============================================================================
benchmark:
  name: "Gys_io Benchmark - Subfiling"
  workdir: "/beegfs/aloupoue/iops_runs"
  repetitions: 5
  search_method: "exhaustive"
  executor: "slurm"
  cache_file: "/beegfs/aloupoue/iops_cache.db"
  probes:
    resource_sampling: true
    sampling_interval: 1

vars:
  subfile_stripe:
    type: int
    sweep:
      mode: list
      values: [33554432, 67108864, 134217728, 268435456, 536870912]
  
  pdi_config:
    type: str
    expr: "pdi_config.yaml"

  gys_io_output:
    type: str
    expr: "{{ execution_dir }}/summary.txt"

  nodes: 8
  ntasks_per_node: 8

command:
  template: "~/gysela-mini-app_io/build/apps/gys_io /beegfs/aloupoue/gys_io.yaml /beegfs/aloupoue/{{ pdi_config }}"

scripts:
  - name: "gys_io subfile benchmark"
    script_template: |
      #!/bin/bash
      #SBATCH --job-name=gys_io
      #SBATCH --nodes=2
      #SBATCH --ntasks-per-node=32
      #SBATCH --time=02:00:00
      #SBATCH --exclusive
      #SBATCH --constraint='bora'
      
      set -e
      set -o pipefail

      rm /beegfs/aloupoue/ost_8/*

      source ~/env_sub.sh

      export HDF5_SUBFILING_STRIPE_SIZE={{ subfile_stripe }}
      mpirun -np $SLURM_NTASKS --map-by ppr:32:node {{ command.template }} >> {{ execution_dir }}/slurm.out >&1
      
    parser:
      file: "{{ execution_dir }}/slurm.out"
      metrics:
        - name: time_write
          type: float
        - name: time_total
          type: float
        - name: bandwidth
          type: float 
      parser_script: |
        import json
        import os

        def parse(file_path):
          with open(file_path, "r") as f:
              lines = f.readlines()
              time_write = None
              time_total = None
              for line in lines:
                if "Time write:" in line:
                  # Extract the time_write value from the line and retrieve the letter 's'
                  time_write = float(line.split("Time write:")[1].strip().rstrip('s'))
                elif "Time total:" in line:
                  # Extract the time_total value from the line and retrieve the letter 's'
                  time_total = float(line.split("Time total:")[1].strip().rstrip('s'))

          return {
            "time_write": time_write,
            "time_total": time_total,
            "bandwidth": round((68719484416 / (1024**3))/time_write, 2) if time_write else None
          }


output:
  sink:
    type: csv
    path: "{{ workdir }}/results_gys_io_bora.csv"
